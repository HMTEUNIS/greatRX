<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inventory Check</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        background: #fafafa;
        color: #111;
      }
      h1 {
        font-size: 1rem;
        margin: 0 0 12px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8rem;
      }
      th,
      td {
        text-align: left;
        padding: 6px 8px;
        border-bottom: 1px solid #ddd;
      }
      .muted {
        color: #666;
        font-size: 0.75rem;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Inventory (demo)</h1>
    <p id="lead">Resolving medication from ticket…</p>
    <table id="tbl" hidden>
      <thead>
        <tr>
          <th>SKU</th>
          <th>On hand</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="body"></tbody>
    </table>
    <p class="muted">Placeholder rows; wire to your inventory API using medication ID from ZAF.</p>
    <script src="/apps/zaf-embed.js"></script>
    <script>
      (function () {
        var lead = document.getElementById("lead");
        var tbl = document.getElementById("tbl");
        var body = document.getElementById("body");
        window.greatrxZaf.loadTicketContext().then(function (c) {
          lead.textContent = c.medicationId
            ? "Stock levels for medication " + c.medicationId
            : "No medication_id tag on this ticket — showing sample data.";
          var rows = [
            ["RX-DEMO-01", "120", "OK"],
            ["RX-DEMO-02", "14", "Low"],
            ["RX-BACKORDER", "0", "Backorder"]
          ];
          rows.forEach(function (r) {
            var tr = document.createElement("tr");
            r.forEach(function (cell) {
              var td = document.createElement("td");
              td.textContent = cell;
              tr.appendChild(td);
            });
            body.appendChild(tr);
          });
          tbl.hidden = false;
        });
      })();
    </script>
  </body>
</html>
