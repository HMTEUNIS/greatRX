<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shipments</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        background: #fafafa;
        color: #111;
      }
      h1 {
        font-size: 1rem;
        margin: 0 0 12px;
      }
      ul {
        margin: 0;
        padding-left: 1.1rem;
        font-size: 0.85rem;
      }
      li {
        margin-bottom: 8px;
      }
      .badge {
        display: inline-block;
        font-size: 0.65rem;
        padding: 2px 6px;
        border-radius: 4px;
        background: #e8e8e8;
        margin-left: 6px;
      }
      .muted {
        color: #666;
        font-size: 0.75rem;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Pending shipments</h1>
    <p id="sub"></p>
    <ul id="list"></ul>
    <p class="muted">Demo list only — connect to your carrier or warehouse API.</p>
    <script src="/apps/zaf-embed.js"></script>
    <script>
      (function () {
        var sub = document.getElementById("sub");
        var list = document.getElementById("list");
        window.greatrxZaf.loadTicketContext().then(function (c) {
          sub.textContent = c.pharmacyId
            ? "Showing placeholder shipments for pharmacy " + c.pharmacyId + "."
            : "No pharmacy_id tag — generic demo shipments.";
          var items = [
            { id: "SHP-9001", dest: "Main fulfillment", st: "Label created" },
            { id: "SHP-9002", dest: "Patient delivery", st: "In transit" },
            { id: "SHP-9003", dest: "Store transfer", st: "Exception" }
          ];
          items.forEach(function (x) {
            var li = document.createElement("li");
            li.textContent = x.id + " → " + x.dest + " ";
            var b = document.createElement("span");
            b.className = "badge";
            b.textContent = x.st;
            li.appendChild(b);
            list.appendChild(li);
          });
        });
      })();
    </script>
  </body>
</html>
